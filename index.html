<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计资源库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(120, 80, 255, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 100, 180, 0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 30px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #e0e7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .tagline {
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto 50px;
        }

        .search-input {
            width: 100%;
            padding: 20px 60px 20px 30px;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 0 40px rgba(255,255,255,0.15);
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .search-icon {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            opacity: 0.6;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 25px 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-3px);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
        }

        .stat-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .file-card {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 24px 28px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .file-card:hover {
            background: rgba(255,255,255,0.15);
            transform: translateX(5px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .file-icon {
            font-size: 2.5rem;
            flex-shrink: 0;
        }

        .file-content {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .file-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tag-pdf {
            background: rgba(239, 68, 68, 0.25);
            color: #fca5a5;
        }

        .tag-image {
            background: rgba(59, 130, 246, 0.25);
            color: #93c5fd;
        }

        .tag-doc {
            background: rgba(245, 158, 11, 0.25);
            color: #fcd34d;
        }

        .tag-other {
            background: rgba(168, 85, 247, 0.25);
            color: #d8b4fe;
        }

        .meta-text {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }

        .file-thumb {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .file-actions {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-download {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn-preview {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.9);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-preview:hover {
            background: rgba(255,255,255,0.2);
        }

        .no-results {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.5);
        }

        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }

        footer a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
        }

        footer a:hover {
            color: #fff;
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
                align-items: center;
            }

            .stat-card {
                width: 100%;
                max-width: 280px;
                padding: 20px;
            }

            .file-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .file-thumb {
                width: 100%;
                height: auto;
                aspect-ratio: 16/9;
            }

            .file-actions {
                width: 100%;
            }

            .btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>设计资源库</h1>
            <p class="tagline">Design Resource Center</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">全部资源</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pdfCount">0</div>
                <div class="stat-label">PDF 文档</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="imageCount">0</div>
                <div class="stat-label">图片素材</div>
            </div>
        </div>

        <div class="search-wrapper">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索文件...">
            <span class="search-icon">🔍</span>
        </div>

        <div class="file-list" id="fileList"></div>

        <div class="no-results" id="noResults" style="display: none;">
            <div class="no-results-icon">📭</div>
            <p>没有找到匹配的文件</p>
        </div>

        <footer>
            <p>📧 <a href="mailto:1443890059@qq.com">1443890059@qq.com</a></p>
        </footer>
    </div>

    <script>
        const files = [
            {
                name: "GD28系列灵巧型通用变频器产品手册（中文）",
                type: "pdf",
                size: "约 5 MB",
                date: "2025年6月",
                download: "https://github.com/qipengchen08/CQP/raw/main/GD28-manual.pdf",
                preview: "https://github.com/qipengchen08/CQP/blob/main/GD28-manual.pdf",
                tag: "产品手册"
            },
            {
                name: "长图文中文",
                type: "image",
                size: "3.0 MB",
                date: "2026年4月",
                download: "https://raw.githubusercontent.com/qipengchen08/CQP/main/长图文中文.png",
                preview: "https://raw.githubusercontent.com/qipengchen08/CQP/main/长图文中文.png",
                tag: "长图文",
                thumb: "https://raw.githubusercontent.com/qipengchen08/CQP/main/长图文中文.png"
            }
        ];

        const fileList = document.getElementById('fileList');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const totalCount = document.getElementById('totalCount');
        const pdfCount = document.getElementById('pdfCount');
        const imageCount = document.getElementById('imageCount');

        function getFileIcon(type) {
            return type === 'pdf' ? '📘' : type === 'image' ? '🖼️' : '📎';
        }

        function getTagClass(type) {
            return 'tag-' + type;
        }

        function renderFiles(filter = '') {
            const filtered = files.filter(f => 
                f.name.toLowerCase().includes(filter.toLowerCase()) ||
                f.tag.toLowerCase().includes(filter.toLowerCase())
            );

            if (filtered.length === 0) {
                fileList.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }

            fileList.style.display = 'flex';
            noResults.style.display = 'none';

            fileList.innerHTML = filtered.map(f => `
                <div class="file-card">
                    <div class="file-icon">${getFileIcon(f.type)}</div>
                    <div class="file-content">
                        <div class="file-name">${f.name}</div>
                        <div class="file-meta">
                            <span class="file-tag ${getTagClass(f.type)}">${f.tag}</span>
                            <span class="meta-text">📅 ${f.date}</span>
                            <span class="meta-text">📦 ${f.size}</span>
                        </div>
                    </div>
                    ${f.thumb ? `<img src="${f.thumb}" alt="${f.name}" class="file-thumb">` : ''}
                    <div class="file-actions">
                        <a href="${f.download}" class="btn btn-download" download>⬇️ 下载</a>
                        <a href="${f.preview}" class="btn btn-preview" target="_blank">👁️ 预览</a>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            totalCount.textContent = files.length;
            pdfCount.textContent = files.filter(f => f.type === 'pdf').length;
            imageCount.textContent = files.filter(f => f.type === 'image').length;
        }

        searchInput.addEventListener('input', (e) => renderFiles(e.target.value));

        updateStats();
        renderFiles();
    </script>
</body>
</html>

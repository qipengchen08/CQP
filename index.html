<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CQP 设计资源库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* 搜索框 */
        .search-box {
            margin-bottom: 40px;
        }

        .search-input {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: block;
            padding: 18px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            outline: none;
            transition: box-shadow 0.3s ease;
        }

        .search-input:focus {
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }

        .search-input::placeholder {
            color: #999;
        }

        /* 文件列表 */
        .file-list {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s ease;
            gap: 20px;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: #f8f9fa;
        }

        .file-icon {
            font-size: 2.5rem;
            flex-shrink: 0;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: #888;
        }

        .file-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tag-pdf {
            background: #ffebee;
            color: #c62828;
        }

        .tag-image {
            background: #e3f2fd;
            color: #1565c0;
        }

        .tag-doc {
            background: #fff3e0;
            color: #e65100;
        }

        .tag-other {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .file-actions {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-download {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-preview {
            background: #f8f9fa;
            color: #333;
        }

        .btn-preview:hover {
            background: #e9ecef;
        }

        /* 预览图片 */
        .preview-thumb {
            width: 100%;
            max-width: 300px;
            border-radius: 8px;
            margin-top: 10px;
        }

        /* 无结果 */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        /* 统计 */
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            color: white;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            color: white;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .file-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .file-actions {
                width: 100%;
            }

            .btn {
                flex: 1;
                justify-content: center;
            }

            .file-meta {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 CQP 设计资源库</h1>
            <p class="subtitle">专业产品手册与设计文档下载中心</p>
        </header>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">全部资源</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="pdfCount">0</div>
                <div class="stat-label">PDF 文档</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="imageCount">0</div>
                <div class="stat-label">图片素材</div>
            </div>
        </div>

        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 输入关键词搜索文件...">
        </div>

        <div class="file-list" id="fileList">
            <!-- 文件列表由 JavaScript 动态生成 -->
        </div>

        <div class="no-results" id="noResults" style="display: none;">
            <div class="no-results-icon">🔍</div>
            <p>没有找到匹配的文件</p>
        </div>

        <footer>
            <p>📧 联系邮箱: 1443890059@qq.com</p>
            <p style="margin-top: 10px;">© 2026 CQP 设计资源库</p>
        </footer>
    </div>

    <script>
        // 文件数据 - 每次上传新文件后更新这里
        const files = [
            {
                name: "GD28系列灵巧型通用变频器产品手册（中文）",
                type: "pdf",
                size: "约 5 MB",
                date: "2025年6月",
                download: "https://github.com/qipengchen08/CQP/raw/main/GD28-manual.pdf",
                preview: "https://github.com/qipengchen08/CQP/blob/main/GD28-manual.pdf",
                tag: "产品手册"
            },
            {
                name: "长图文中文",
                type: "image",
                size: "3.0 MB",
                date: "2026年4月",
                download: "https://raw.githubusercontent.com/qipengchen08/CQP/main/长图文中文.png",
                preview: "https://raw.githubusercontent.com/qipengchen08/CQP/main/长图文中文.png",
                tag: "长图文",
                thumb: "https://raw.githubusercontent.com/qipengchen08/CQP/main/长图文中文.png"
            }
        ];

        const fileList = document.getElementById('fileList');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const totalCount = document.getElementById('totalCount');
        const pdfCount = document.getElementById('pdfCount');
        const imageCount = document.getElementById('imageCount');

        // 获取文件图标
        function getFileIcon(type) {
            switch(type) {
                case 'pdf': return '📘';
                case 'image': return '🖼️';
                case 'doc': return '📄';
                default: return '📎';
            }
        }

        // 获取标签样式
        function getTagClass(type) {
            switch(type) {
                case 'pdf': return 'tag-pdf';
                case 'image': return 'tag-image';
                case 'doc': return 'tag-doc';
                default: return 'tag-other';
            }
        }

        // 渲染文件列表
        function renderFiles(filter = '') {
            const filtered = files.filter(f => 
                f.name.toLowerCase().includes(filter.toLowerCase()) ||
                f.tag.toLowerCase().includes(filter.toLowerCase())
            );

            if (filtered.length === 0) {
                fileList.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }

            fileList.style.display = 'block';
            noResults.style.display = 'none';

            fileList.innerHTML = filtered.map(f => `
                <div class="file-item">
                    <div class="file-icon">${getFileIcon(f.type)}</div>
                    <div class="file-info">
                        <div class="file-name">${f.name}</div>
                        <div class="file-meta">
                            <span class="file-tag ${getTagClass(f.type)}">${f.tag}</span>
                            <span>📅 ${f.date}</span>
                            <span>📦 ${f.size}</span>
                        </div>
                        ${f.thumb ? `<img src="${f.thumb}" alt="${f.name}" class="preview-thumb" loading="lazy">` : ''}
                    </div>
                    <div class="file-actions">
                        <a href="${f.download}" class="btn btn-download" download>
                            ⬇️ 下载
                        </a>
                        <a href="${f.preview}" class="btn btn-preview" target="_blank">
                            👁️ 预览
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // 更新统计
        function updateStats() {
            totalCount.textContent = files.length;
            pdfCount.textContent = files.filter(f => f.type === 'pdf').length;
            imageCount.textContent = files.filter(f => f.type === 'image').length;
        }

        // 搜索功能
        searchInput.addEventListener('input', (e) => {
            renderFiles(e.target.value);
        });

        // 初始化
        updateStats();
        renderFiles();
    </script>
</body>
</html>

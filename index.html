<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计资源库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%);
            min-height: 100vh;
            color: #1e3a5f;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 30px;
        }

        /* ===== 首页大标题 ===== */
        .home-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .home-header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0284c7, #0369a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .home-header p {
            color: rgba(30, 58, 95, 0.5);
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* ===== 首页分类卡片（2×2 网格） ===== */
        .home-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 60px;
        }

        .home-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 4px 20px rgba(2, 132, 199, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .home-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(2, 132, 199, 0.2);
        }

        .home-card-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            object-fit: contain;
        }

        .home-card-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 8px;
        }

        .home-card-count {
            font-size: 0.85rem;
            color: #64748b;
        }

        .home-card-count span {
            font-weight: 600;
            color: #0284c7;
        }

        /* ===== 子分类标签栏 ===== */
        .subcat-bar {
            margin-bottom: 24px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(2, 132, 199, 0.1);
        }

        .subcat-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .subcat-btn {
            padding: 8px 18px;
            border: 1.5px solid rgba(2, 132, 199, 0.2);
            border-radius: 20px;
            background: white;
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .subcat-btn:hover {
            background: #e0f2fe;
            border-color: #0284c7;
            color: #0284c7;
        }

        .subcat-btn.active {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            border-color: #0284c7;
            color: white;
            font-weight: 600;
        }

        .tag-subcat {
            background: rgba(139, 92, 246, 0.1);
            color: #7c3aed;
        }

        /* ===== 分类列表页 ===== */
        .list-page {
            display: none;
        }

        .list-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            background: white;
            border: 2px solid rgba(2, 132, 199, 0.2);
            border-radius: 12px;
            color: #0284c7;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-back:hover {
            background: #e0f2fe;
            border-color: #0284c7;
        }

        .list-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1e3a5f;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .list-count {
            font-size: 1rem;
            font-weight: 400;
            color: #64748b;
            font-weight: 400;
        }

        /* ===== 文件列表 ===== */
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .file-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px 28px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(2, 132, 199, 0.08);
            transition: all 0.3s ease;
        }

        .file-card:hover {
            box-shadow: 0 8px 30px rgba(2, 132, 199, 0.15);
            transform: translateY(-2px);
        }

        .file-thumb {
            width: 100px;
            height: 70px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            border: 1px solid #334155;
        }

        .file-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .file-thumb .thumb-placeholder {
            font-size: 1.8rem;
        }

        .file-content {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #1e3a5f;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .file-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tag-pdf {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .tag-image {
            background: rgba(2, 132, 199, 0.1);
            color: #0284c7;
        }

        .meta-text {
            font-size: 0.85rem;
            color: #64748b;
        }

        .file-actions {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn-preview {
            background: rgba(2, 132, 199, 0.1);
            color: #0284c7;
            border: 1.5px solid rgba(2, 132, 199, 0.3);
        }

        .btn-preview:hover {
            background: #0284c7;
            color: white;
        }

        .btn-download {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            color: white;
        }

        .btn-download:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.4);
        }

        /* ===== 预览弹窗 ===== */
        .preview-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .preview-overlay.show {
            display: flex;
        }

        .preview-modal {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 1000px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .preview-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: linear-gradient(135deg, #f8fafc, #e0f2fe);
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .preview-modal-title {
            font-size: 1rem;
            font-weight: 600;
            color: #1e3a5f;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 16px;
        }

        .preview-modal-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .zoom-btn {
            background: white;
            border: 1px solid rgba(2, 132, 199, 0.2);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #64748b;
            line-height: 1;
        }

        .zoom-btn:hover {
            background: #e0f2fe;
            color: #0284c7;
        }

        .zoom-level {
            font-size: 0.8rem;
            color: #0284c7;
            min-width: 40px;
            text-align: center;
            font-weight: 600;
        }

        .btn-close {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            color: #94a3b8;
            transition: all 0.2s;
        }

        .btn-close:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        .preview-modal-body {
            flex: 1;
            overflow: auto;
            background: #1a1a2e;
            cursor: grab;
            min-height: 0;
            /* 水平居中 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .preview-modal-body:active {
            cursor: grabbing;
        }

        .preview-modal-body::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .preview-modal-body::-webkit-scrollbar-track {
            background: #2a2a3e;
        }

        .preview-modal-body::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .preview-modal-body img {
            /* 移除 max-width:100%，让 JS 控制尺寸 */
            max-height: calc(90vh - 140px);
            display: block;
            border-radius: 4px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
            margin-top: 12px;
            padding: 0 20px 20px;
        }

        .preview-modal-body iframe {
            width: calc(100% - 40px);
            min-height: calc(90vh - 140px);
            border: none;
            background: #f8fafc;
            margin-top: 12px;
            padding: 0;
            display: block;
        }

        .preview-modal-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: white;
            border-top: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .preview-file-info {
            font-size: 0.8rem;
            color: #64748b;
        }

        footer {
            text-align: center;
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid rgba(2, 132, 199, 0.1);
            color: #64748b;
            font-size: 0.9rem;
        }

        footer a {
            color: #0284c7;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }

            .home-header h1 {
                font-size: 2rem;
            }

            .home-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }

            .home-card {
                padding: 28px 16px;
            }

            .home-card-icon {
                font-size: 2.4rem;
            }

            .home-card-name {
                font-size: 1.1rem;
            }

            .file-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .file-actions {
                width: 100%;
            }

            .btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== 首页 ===== -->
        <div id="homePage">
            <div class="home-header">
                <h1>设计资源库</h1>
                <p>Design Resource Center</p>
            </div>
            <div class="home-grid" id="homeGrid"></div>
        </div>

        <!-- ===== 分类列表页 ===== -->
        <div id="listPage" class="list-page">
            <div class="list-header">
                <button class="btn-back" onclick="goHome()">← 返回</button>
                <div class="list-title">
                    <span id="listIcon"></span>
                    <span id="listTitle"></span>
                    <span class="list-count" id="listCount"></span>
                </div>
            </div>
            <!-- 子分类标签栏 -->
            <div id="subcatBar" class="subcat-bar" style="display:none;">
                <div class="subcat-list" id="subcatList"></div>
            </div>
            <div class="file-list" id="fileList"></div>
        </div>

        <footer>
            <p>📧 <a href="mailto:1443890059@qq.com">1443890059@qq.com</a></p>
        </footer>
    </div>

    <!-- ===== 预览弹窗 ===== -->
    <div class="preview-overlay" id="previewOverlay">
        <div class="preview-modal">
            <div class="preview-modal-header">
                <span class="preview-modal-title" id="modalTitle"></span>
                <div class="preview-modal-controls" id="modalControls" style="display:none;">
                    <button class="zoom-btn" id="zoomOutBtn">−</button>
                    <span class="zoom-level" id="zoomLevel">适应</span>
                    <button class="zoom-btn" id="zoomInBtn">+</button>
                    <button class="zoom-btn" id="zoomResetBtn" style="font-size:0.75rem;">↺</button>
                </div>
                <button class="btn-close" id="closeBtn">✕</button>
            </div>
            <div class="preview-modal-body" id="previewBody"></div>
            <div class="preview-modal-footer">
                <span class="preview-file-info" id="modalInfo"></span>
                <div>
                    <a href="#" class="btn btn-download" id="modalDownload">⬇️ 下载</a>
                </div>
            </div>
        </div>
    </div>

    <script>
const files = [];

const categories = [
    { 
        id: 'icon',       
        name: '图标类素材',     
        icon: 'icons/icon-category.png', 
        key: 'icon',
        subcategories: [
            { id: 'brand', name: '品牌核心图标' },
            { id: 'function', name: '功能图标' },
            { id: 'compliance', name: '合规标识' },
            { id: 'multilang', name: '多语种图标' }
        ]
    },
    { 
        id: 'background', 
        name: '背景类素材',     
        icon: 'icons/bg-category.png', 
        key: 'background',
        subcategories: [
            { id: 'company', name: '公司图' },
            { id: 'industry', name: '行业图' },
            { id: 'poster', name: '海报背景' }
        ]
    },
    { 
        id: 'graphic',    
        name: '图形元素素材',   
        icon: 'icons/graphic-category.png', 
        key: 'graphic',
        subcategories: [
            { id: 'decoration', name: '装饰元素' },
            { id: 'dataviz', name: '数据可视化' },
            { id: 'layout', name: '排版辅助' }
        ]
    },
    { 
        id: 'font',       
        name: '字体与规范素材', 
        icon: 'icons/font-category.png', 
        key: 'font',
        subcategories: [
            { id: 'fontlib', name: '品牌字体库' },
            { id: 'vi', name: 'VI规范文件' },
            { id: 'template', name: '模板源文件' }
        ]
    }
];

// ===== 渲染首页 =====
function renderHome() {
    const grid = document.getElementById('homeGrid');
    grid.innerHTML = categories.map(cat => {
        const count = files.filter(f => f.category === cat.key).length;
        const isImage = cat.icon.includes('.');
        return `
            <div class="home-card" onclick="goCategory('${cat.key}')">
                ${isImage 
                    ? `<img class="home-card-icon" src="${cat.icon}" alt="${cat.name}">`
                    : `<div class="home-card-icon">${cat.icon}</div>`
                }
                <div class="home-card-name">${cat.name}</div>
                <div class="home-card-count"><span>${count}</span> 个文件</div>
            </div>
        `;
    }).join('');
}

// ===== 跳转分类列表 =====
function goCategory(catKey) {
    const cat = categories.find(c => c.key === catKey);
    const catFiles = files.filter(f => f.category === catKey);

    document.getElementById('homePage').style.display = 'none';
    document.getElementById('listPage').style.display = 'block';

    // 处理列表页图标（支持图片）
    const listIconEl = document.getElementById('listIcon');
    const isImage = cat.icon.includes('.');
    if (isImage) {
        listIconEl.innerHTML = `<img src="${cat.icon}" alt="${cat.name}" style="width:32px;height:32px;object-fit:contain;">`;
    } else {
        listIconEl.textContent = cat.icon;
    }
    document.getElementById('listTitle').textContent = cat.name;

    // 渲染子分类标签
    const subcatBar = document.getElementById('subcatBar');
    const subcatList = document.getElementById('subcatList');
    if (cat.subcategories && cat.subcategories.length > 0) {
        subcatBar.style.display = 'block';
        subcatList.innerHTML = `
            <button class="subcat-btn active" data-subcat="all">全部</button>
            ${cat.subcategories.map(sc => `
                <button class="subcat-btn" data-subcat="${sc.id}">${sc.name}</button>
            `).join('')}
        `;
    } else {
        subcatBar.style.display = 'none';
    }

    // 渲染文件列表
    renderFileList(catKey, 'all');

    // 子分类按钮点击事件
    subcatList.onclick = function(e) {
        if (e.target.classList.contains('subcat-btn')) {
            document.querySelectorAll('.subcat-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            const subcat = e.target.dataset.subcat;
            renderFileList(catKey, subcat);
        }
    };
}

// ===== 渲染文件列表（支持子分类筛选）=====
function renderFileList(catKey, subcat) {
    const cat = categories.find(c => c.key === catKey);
    let catFiles = files.filter(f => f.category === catKey);
    
    // 子分类筛选
    if (subcat !== 'all') {
        catFiles = catFiles.filter(f => f.subcategory === subcat);
    }

    document.getElementById('listCount').textContent = `（${catFiles.length} 个文件）`;

    const list = document.getElementById('fileList');
    if (catFiles.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:60px;color:#94a3b8;">暂无文件</div>';
        return;
    }

    list.innerHTML = catFiles.map((f, i) => `
        <div class="file-card" data-file-index="${files.indexOf(f)}">
            <div class="file-thumb">
                ${f.type === 'pdf'
                    ? '<span class="thumb-placeholder">📘</span>'
                    : `<img src="${f.preview}" alt="${f.name}" onerror="this.style.display='none';this.nextSibling.style.display='flex';" loading="eager"><span class="thumb-placeholder" style="display:none;">🖼️</span>`
                }
            </div>
            <div class="file-content">
                <div class="file-name" title="${f.name}">${f.name}</div>
                <div class="file-meta">
                    <span class="file-tag tag-${f.type}">${f.type.toUpperCase()}</span>
                    ${f.subcategory ? `<span class="file-tag tag-subcat">${getSubcatName(catKey, f.subcategory)}</span>` : ''}
                    <span class="meta-text">${f.size}</span>
                    <span class="meta-text">${f.date}</span>
                </div>
            </div>
            <div class="file-actions">
                <button class="btn btn-preview" data-action="preview">👁️ 预览</button>
                <a href="${f.download}" class="btn btn-download" target="_blank" data-action="download">⬇️ 下载</a>
            </div>
        </div>
    `).join('');
}

// ===== 获取子分类名称 =====
function getSubcatName(catKey, subcatId) {
    const cat = categories.find(c => c.key === catKey);
    if (!cat || !cat.subcategories) return '';
    const subcat = cat.subcategories.find(s => s.id === subcatId);
    return subcat ? subcat.name : '';
}

// ===== 返回首页 =====
function goHome() {
    document.getElementById('listPage').style.display = 'none';
    document.getElementById('homePage').style.display = 'block';
}

// ===== 预览弹窗 =====
let currentImg = null;

function openPreview(file) {
    const overlay = document.getElementById('previewOverlay');
    const body = document.getElementById('previewBody');
    const modalControls = document.getElementById('modalControls');

    document.getElementById('modalTitle').textContent = file.name;
    document.getElementById('modalInfo').textContent =
        file.type.toUpperCase() + ' · ' + file.size + ' · ' + file.date;
    document.getElementById('modalDownload').href = file.download;

    body.innerHTML = '';

    if (file.type === 'image') {
        modalControls.style.display = 'flex';
        const img = document.createElement('img');
        img.src = file.preview;
        img.alt = file.name;
        img.id = 'modalImg';
        img.onload = function() {
            img.dataset.fitScale = Math.min(
                (body.clientWidth - 40) / img.naturalWidth,
                (window.innerHeight * 0.9 - 140) / img.naturalHeight,
                1
            );
            img.dataset.zoomLevel = '1';
            img.style.width = (img.naturalWidth * img.dataset.fitScale) + 'px';
            img.style.height = 'auto';
            img.style.maxWidth = 'none';
            img.style.maxHeight = 'none';
        };
        body.appendChild(img);
        currentImg = img;
    } else {
        modalControls.style.display = 'none';
        const iframe = document.createElement('iframe');
        iframe.src = file.preview;
        iframe.title = file.name;
        body.appendChild(iframe);
        currentImg = null;
    }

    overlay.classList.add('show');
    body.scrollTop = 0;
}

function closePreview() {
    document.getElementById('previewOverlay').classList.remove('show');
    currentImg = null;
}

document.getElementById('closeBtn').addEventListener('click', closePreview);
document.getElementById('previewOverlay').addEventListener('click', function(e) {
    if (e.target === this) closePreview();
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePreview();
});

// ===== 图片缩放 =====
function applyZoom(img, level) {
    const fitScale = parseFloat(img.dataset.fitScale) || 1;
    const targetScale = fitScale * level;
    // 直接设置 width，绕过 CSS max-width/max-height 的限制
    img.style.width = (img.naturalWidth * targetScale) + 'px';
    img.style.height = 'auto';
    img.style.maxWidth = 'none';
    img.style.maxHeight = 'none';

    const zoomEl = document.getElementById('zoomLevel');
    if (zoomEl) {
        zoomEl.textContent = level <= 1.1 ? '适应' : Math.round(level * 100) + '%';
    }
}

// 点击按钮放大/缩小
document.getElementById('zoomInBtn').addEventListener('click', function() {
    if (!currentImg) return;
    const cur = parseFloat(currentImg.dataset.zoomLevel || 1);
    const next = Math.min(cur + 0.5, 8);
    currentImg.dataset.zoomLevel = next;
    applyZoom(currentImg, next);
});

document.getElementById('zoomOutBtn').addEventListener('click', function() {
    if (!currentImg) return;
    const cur = parseFloat(currentImg.dataset.zoomLevel || 1);
    const next = Math.max(cur - 0.5, 0.5);
    currentImg.dataset.zoomLevel = next;
    applyZoom(currentImg, next);
});

document.getElementById('zoomResetBtn').addEventListener('click', function() {
    if (!currentImg) return;
    currentImg.dataset.zoomLevel = '1';
    applyZoom(currentImg, 1);
});

// ===== 鼠标滚轮缩放（仅在图片上）=====
document.getElementById('previewBody').addEventListener('wheel', function(e) {
    if (!currentImg) return;
    // 只有鼠标在图片上才缩放，空白区域允许正常滚动
    if (!currentImg.contains(e.target)) return;
    e.preventDefault();
    const cur = parseFloat(currentImg.dataset.zoomLevel || 1);
    const delta = e.deltaY > 0 ? -0.2 : 0.2;
    const next = Math.max(0.5, Math.min(8, cur + delta));
    currentImg.dataset.zoomLevel = next;
    applyZoom(currentImg, next);
}, { passive: false });

// ===== 双击重置缩放（仅在图片上）=====
document.getElementById('previewBody').addEventListener('dblclick', function(e) {
    if (!currentImg) return;
    if (!currentImg.contains(e.target)) return;
    currentImg.dataset.zoomLevel = '1';
    applyZoom(currentImg, 1);
});

// ===== 拖拽滚动弹窗内容 =====
(function() {
    const body = document.getElementById('previewBody');
    let dragging = false, startX = 0, startY = 0, scrollLeft = 0, scrollTop = 0;

    body.addEventListener('mousedown', function(e) {
        // 不拦截按钮和链接
        if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
        dragging = true;
        startX = e.pageX;
        startY = e.pageY;
        scrollLeft = body.scrollLeft;
        scrollTop = body.scrollTop;
        body.style.cursor = 'grabbing';
        e.preventDefault();
    });

    body.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        e.preventDefault();
        body.scrollLeft = scrollLeft - (e.pageX - startX);
        body.scrollTop = scrollTop - (e.pageY - startY);
    });

    document.addEventListener('mouseup', function() {
        if (dragging) {
            dragging = false;
            body.style.cursor = 'grab';
        }
    });
})();

// ===== 文件卡片点击事件委托 =====
document.getElementById('fileList').addEventListener('click', function(e) {
    const card = e.target.closest('.file-card');
    if (!card) return;

    const idx = parseInt(card.dataset.fileIndex);
    const file = files[idx];
    if (isNaN(idx) || !file) return;

    const action = e.target.dataset.action;
    if (action === 'download') return; // let <a> handle naturally
    if (action === 'preview' || e.target.tagName === 'IMG') {
        openPreview(file);
    }
});

// ===== 初始化 =====
renderHome();
    </script>

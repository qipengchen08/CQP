<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计资源库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%);
            min-height: 100vh;
            color: #1e3a5f;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(255, 255, 255, 0.8) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(186, 230, 253, 0.5) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 30px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0284c7, #0369a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .tagline {
            color: rgba(30, 58, 95, 0.5);
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto 50px;
        }

        .search-input {
            width: 100%;
            padding: 20px 60px 20px 30px;
            font-size: 1.1rem;
            background: white;
            border: 2px solid rgba(2, 132, 199, 0.2);
            border-radius: 16px;
            color: #1e3a5f;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: rgba(2, 132, 199, 0.5);
            box-shadow: 0 0 30px rgba(2, 132, 199, 0.2);
        }

        .search-input::placeholder {
            color: #94a3b8;
        }

        .search-icon {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            opacity: 0.5;
        }

        /* 分类 */
        .category {
            margin-bottom: 50px;
        }

        .category-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(2, 132, 199, 0.2);
        }

        .category-icon {
            font-size: 1.8rem;
        }

        .category-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e3a5f;
        }

        .category-count {
            margin-left: auto;
            background: rgba(2, 132, 199, 0.1);
            color: #0284c7;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .file-card {
            padding: 24px 28px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(2, 132, 199, 0.08);
            transition: all 0.3s ease;
        }

        .file-card:hover {
            box-shadow: 0 8px 30px rgba(2, 132, 199, 0.12);
        }

        .file-header {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .file-icon {
            font-size: 2.5rem;
            flex-shrink: 0;
        }

        .file-content {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e3a5f;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .file-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tag-pdf {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .tag-image {
            background: rgba(2, 132, 199, 0.1);
            color: #0284c7;
        }

        .tag-doc {
            background: rgba(245, 158, 11, 0.1);
            color: #d97706;
        }

        .tag-other {
            background: rgba(168, 85, 247, 0.1);
            color: #9333ea;
        }

        .meta-text {
            font-size: 0.85rem;
            color: #64748b;
        }

        .file-actions {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn-download {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            color: white;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(2, 132, 199, 0.4);
        }

        .btn-preview {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .btn-preview:hover {
            background: #e2e8f0;
        }

        .btn-preview.active {
            background: rgba(2, 132, 199, 0.1);
            color: #0284c7;
            border-color: rgba(2, 132, 199, 0.3);
        }

        /* 预览区域 */
        .preview-container {
            margin-top: 20px;
            border-radius: 12px;
            overflow: hidden;
            background: #f8fafc;
            border: 2px dashed rgba(2, 132, 199, 0.2);
            display: none;
            position: relative;
        }

        .preview-container.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            height: 52px;
            flex-shrink: 0;
        }

        .preview-title {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
        }

        .preview-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #e0f2fe;
            padding: 6px 14px;
            border-radius: 10px;
            border: 1px solid rgba(2, 132, 199, 0.3);
        }

        .zoom-btn {
            background: white;
            border: 1px solid #0284c7;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #0284c7;
            line-height: 1;
            font-weight: 700;
        }

        .zoom-btn:hover {
            background: #0284c7;
            color: white;
            border-color: #0284c7;
        }

        .zoom-level {
            font-size: 0.9rem;
            color: #0284c7;
            min-width: 55px;
            text-align: center;
            font-weight: 800;
        }

        .preview-footer {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            flex-shrink: 0;
            height: 52px;
        }

        .preview-footer.hidden {
            display: none;
        }

        .btn-close-preview {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            color: #94a3b8;
            transition: all 0.2s;
            margin-left: 8px;
        }

        .btn-close-preview:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        .preview-body {
            overflow: hidden;
            background: #f1f5f9;
            position: relative;
            height: calc(70vh - 52px - 52px);
            display: flex;
        }

        /* 左侧图片滚动区域 */
        .preview-scroll-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            padding: 20px;
            background: #f1f5f9;
            cursor: grab;
            display: flex;
            justify-content: center;
        }

        .preview-scroll-area:active {
            cursor: grabbing;
        }

        .preview-scroll-area::-webkit-scrollbar {
            width: 8px;
        }

        .preview-scroll-area::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 4px;
        }

        .preview-scroll-area::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 4px;
        }

        .preview-scroll-area::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* 右侧缩放控制区域 - 已隐藏，功能移至底部按钮 */
        .preview-zoom-area {
            display: none;
        }

        .preview-image-wrapper {
            display: block;
            text-align: center;
        }

        .preview-image {
            transition: max-width 0.2s ease, width 0.2s ease;
            display: block;
            background: #f8fafc;
            max-width: 100%;
            cursor: zoom-in;
        }

        .preview-pdf {
            width: 100%;
            height: 70vh;
            border: none;
            display: block;
            background: #f8fafc;
        }

        .no-results {
            text-align: center;
            padding: 80px 20px;
            color: #64748b;
        }

        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-category {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        footer {
            text-align: center;
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid rgba(2, 132, 199, 0.1);
            color: #64748b;
            font-size: 0.9rem;
        }

        footer a {
            color: #0284c7;
            text-decoration: none;
        }

        footer a:hover {
            color: #0369a1;
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .file-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .file-actions {
                width: 100%;
            }

            .btn {
                flex: 1;
                justify-content: center;
            }

            .preview-title {
                max-width: 150px;
            }

            .zoom-level {
                display: none;
            }

            .preview-body {
                height: calc(55vh - 52px - 52px) !important;
            }


        }
    </style>
</head>

        }

        function setZoom(img, level) {
            const fitScale = parseFloat(img.dataset.fitScale) || 1;
            const targetScale = fitScale * level;
            const scrollArea = img.closest('.preview-scroll-area');
            const maxW = scrollArea.clientWidth - 40;
            const imgW = parseFloat(img.dataset.originalWidth) || img.naturalWidth;
            const displayW = imgW * targetScale;
            img.style.maxWidth = displayW + 'px';
            img.style.width = (displayW > maxW ? maxW : displayW) + 'px';
            img.style.height = 'auto';
        }

        function zoomIn(img) {
            const current = parseFloat(img.dataset.zoomLevel || 2);
            const next = Math.min(current + 0.25, 4);
            img.dataset.zoomLevel = next;
            setZoom(img, next);
        }

        function zoomOut(img) {
            const current = parseFloat(img.dataset.zoomLevel || 2);
            const next = Math.max(current - 0.25, 0.5);
            img.dataset.zoomLevel = next;
            setZoom(img, next);
        }

        function zoomReset(img) {
            img.dataset.zoomLevel = '2';
            fitImage(img);
            setZoom(img, 2);
        }

        function updateZoomDisplay(el, level) {
            if (typeof level === 'string') level = parseFloat(level);
            if (level <= 1.5) {
                el.textContent = '适应';
            } else {
                el.textContent = Math.round(level * 100) + '%';
            }
        }

        function togglePreview(file, btnEl) {
            const card = btnEl.closest('.file-card');
            let container = card.querySelector('.preview-container');

            // 关闭当前预览
            if (currentPreview === card && container && container.classList.contains('show')) {
                container.classList.remove('show');
                btnEl.classList.remove('active');
                btnEl.textContent = '👁️ 预览';
                currentPreview = null;
                return;
            }

            // 关闭之前的预览
            document.querySelectorAll('.preview-container.show').forEach(c => c.classList.remove('show'));
            document.querySelectorAll('.btn-preview.active').forEach(b => {
                b.classList.remove('active');
                b.textContent = '👁️ 预览';
            });

            // 创建预览容器
            if (!container) {
                container = document.createElement('div');
                container.className = 'preview-container';
                card.appendChild(container);
            }

            if (file.type === 'image') {
                container.innerHTML = `
                    <div class="preview-header">
                        <span class="preview-title">${file.name}</span>
                        <button class="btn-close-preview" onclick="closePreview(this)">✕</button>
                    </div>
                    <div class="preview-body">
                        <div class="preview-scroll-area">
                            <div class="preview-image-wrapper">
                                <img src="${file.preview}" alt="${file.name}" class="preview-image">
                            </div>
                        </div>
                    </div>
                    <div class="preview-footer">
                        <div class="zoom-controls">
                            <button class="zoom-btn" title="缩小">🔍−</button>
                            <span class="zoom-level">100%</span>
                            <button class="zoom-btn" title="放大">🔍+</button>
                            <button class="zoom-btn" title="重置" style="font-size:0.75rem;">↺ 适应</button>
                        </div>
                    </div>
                `;
                const zoomBtns = container.querySelectorAll('.zoom-btn');
                const img = container.querySelector('.preview-image');
                const scrollArea = container.querySelector('.preview-scroll-area');
                const zoomLevel = container.querySelector('.zoom-level');

                // 缩放按钮
                zoomBtns[0].onclick = () => { zoomOut(img); updateZoomDisplay(zoomLevel, img.dataset.zoomLevel); };
                zoomBtns[1].onclick = () => { zoomIn(img); updateZoomDisplay(zoomLevel, img.dataset.zoomLevel); };
                zoomBtns[2].onclick = () => { zoomReset(img); updateZoomDisplay(zoomLevel, '2'); };

                // 图片加载后初始化
                img.onload = function() {
                    img.dataset.originalWidth = img.naturalWidth;
                    img.dataset.originalHeight = img.naturalHeight;
                    img.dataset.zoomLevel = '2';
                    fitImage(img);
                    setZoom(img, 2);
                    updateZoomDisplay(zoomLevel, '2');
                    img.style.cursor = 'grab';
                    scrollArea.scrollTop = 0;
                };
                if (img.complete && img.naturalWidth) {
                    img.dataset.originalWidth = img.naturalWidth;
                    img.dataset.originalHeight = img.naturalHeight;
                    img.dataset.zoomLevel = '2';
                    fitImage(img);
                    setZoom(img, 2);
                    updateZoomDisplay(zoomLevel, '2');
                    img.style.cursor = 'grab';
                    scrollArea.scrollTop = 0;
                }

                // 左侧区域：拖拽滚动
                let isDragging = false;
                let startY = 0;
                let scrollTop = 0;

                scrollArea.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    startY = e.pageY;
                    scrollTop = scrollArea.scrollTop;
                    img.style.cursor = 'grabbing';
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    e.preventDefault();
                    const delta = startY - e.pageY;
                    scrollArea.scrollTop = scrollTop + delta;
                });

                document.addEventListener('mouseup', () => {
                    if (isDragging) {
                        isDragging = false;
                        img.style.cursor = 'grab';
                    }
                });

                // 左侧滚轮也支持滚动（备用）
                scrollArea.addEventListener('wheel', (e) => {
                    e.stopPropagation();
                });

                // 点击图片：切换缩放（从 fit 切换到 100%）
                img.addEventListener('click', function() {
                    const current = parseFloat(img.dataset.zoomLevel || 2);
                    if (current >= 2.5) {
                        // 已经放大，缩小回适应
                        img.dataset.zoomLevel = '1.5';
                        fitImage(img);
                        setZoom(img, 1.5);
                        updateZoomDisplay(zoomLevel, 1.5);
                    } else {
                        // 放大到 100%
                        img.dataset.zoomLevel = '2';
                        setZoom(img, 2);
                        updateZoomDisplay(zoomLevel, '2');
                    }
                    scrollArea.scrollTop = 0;
                });
            } else if (file.type === 'pdf') {
                container.innerHTML = `
                    <div class="preview-header">
                        <span class="preview-title">${file.name}</span>
                        <div class="preview-controls">
                            <button class="btn-close-preview" onclick="closePreview(this)">✕</button>
                        </div>
                    </div>
                    <iframe src="${file.preview}" class="preview-pdf" title="${file.name}"></iframe>
                `;
            }

            container.classList.add('show');
            btnEl.classList.add('active');
            btnEl.textContent = '✕ 收起';
            currentPreview = card;
            container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function closePreview(btn) {
            const container = btn.closest('.preview-container');
            const card = container.closest('.file-card');
            container.classList.remove('show');
            const btnEl = card.querySelector('.btn-preview');
            btnEl.classList.remove('active');
            btnEl.textContent = '👁️ 预览';
            currentPreview = null;
        }

        function renderFileCard(f) {
            return `
                <div class="file-card">
                    <div class="file-header">
                        <div class="file-icon">${getFileIcon(f.type)}</div>
                        <div class="file-content">
                            <div class="file-name">${f.name}</div>
                            <div class="file-meta">
                                <span class="file-tag ${getTagClass(f.type)}">${f.type.toUpperCase()}</span>
                                <span class="meta-text">📅 ${f.date}</span>
                                <span class="meta-text">📦 ${f.size}</span>
                            </div>
                        </div>
                        <div class="file-actions">
                            <a href="${f.download}" class="btn btn-download" download>⬇️ 下载</a>
                            <button class="btn btn-preview" data-filename="${f.name.replace(/"/g, '&quot;')}" onclick="togglePreview(files.find(x => x.name === '${f.name.replace(/'/g, "\\'")}'), this)">👁️ 预览</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCategories(filter = '') {
            const categories = ['online', 'offline', 'vi', 'special'];
            let hasResults = false;

            categories.forEach(cat => {
                const filtered = files.filter(f => 
                    f.category === cat && (
                        f.name.toLowerCase().includes(filter.toLowerCase())
                    )
                );

                const listEl = document.getElementById('list-' + cat);
                const countEl = document.getElementById('count-' + cat);

                if (filtered.length === 0) {
                    listEl.innerHTML = '<div class="empty-category">暂无文件</div>';
                    countEl.textContent = '0';
                } else {
                    listEl.innerHTML = filtered.map(renderFileCard).join('');
                    countEl.textContent = filtered.length;
                    hasResults = true;
                }
            });

            noResults.style.display = (!hasResults && filter) ? 'block' : 'none';
            currentPreview = null;
        }

        searchInput.addEventListener('input', (e) => renderCategories(e.target.value));

        renderCategories();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计资源库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%);
            min-height: 100vh;
            color: #1e3a5f;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(255, 255, 255, 0.8) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(186, 230, 253, 0.5) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 30px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0284c7, #0369a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .tagline {
            color: rgba(30, 58, 95, 0.5);
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto 50px;
        }

        .search-input {
            width: 100%;
            padding: 20px 60px 20px 30px;
            font-size: 1.1rem;
            background: white;
            border: 2px solid rgba(2, 132, 199, 0.2);
            border-radius: 16px;
            color: #1e3a5f;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: rgba(2, 132, 199, 0.5);
            box-shadow: 0 0 30px rgba(2, 132, 199, 0.2);
        }

        .search-input::placeholder {
            color: #94a3b8;
        }

        .search-icon {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            opacity: 0.5;
        }

        /* 分类 */
        .category {
            margin-bottom: 50px;
        }

        .category-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(2, 132, 199, 0.2);
        }

        .category-icon {
            font-size: 1.8rem;
        }

        .category-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e3a5f;
        }

        .category-count {
            margin-left: auto;
            background: rgba(2, 132, 199, 0.1);
            color: #0284c7;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .file-card {
            padding: 24px 28px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(2, 132, 199, 0.08);
            transition: all 0.3s ease;
        }

        .file-card:hover {
            box-shadow: 0 8px 30px rgba(2, 132, 199, 0.12);
        }

        .file-header {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .file-icon {
            font-size: 2.5rem;
            flex-shrink: 0;
        }

        .file-content {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e3a5f;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .file-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tag-pdf {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .tag-image {
            background: rgba(2, 132, 199, 0.1);
            color: #0284c7;
        }

        .tag-doc {
            background: rgba(245, 158, 11, 0.1);
            color: #d97706;
        }

        .tag-other {
            background: rgba(168, 85, 247, 0.1);
            color: #9333ea;
        }

        .meta-text {
            font-size: 0.85rem;
            color: #64748b;
        }

        .file-actions {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn-download {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            color: white;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(2, 132, 199, 0.4);
        }

        .btn-preview {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .btn-preview:hover {
            background: #e2e8f0;
        }

        .btn-preview.active {
            background: rgba(2, 132, 199, 0.1);
            color: #0284c7;
            border-color: rgba(2, 132, 199, 0.3);
        }

        /* 主布局：左侧分类 + 右侧预览 */
        .main-layout {
            display: flex;
            gap: 20px;
            min-height: 70vh;
        }

        .categories-panel {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            align-content: start;
        }

        .category-block {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(2, 132, 199, 0.08);
            min-height: 200px;
        }

        .category-block-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(2, 132, 199, 0.1);
        }

        .category-block-icon {
            font-size: 1.4rem;
        }

        .category-block-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e3a5f;
        }

        .category-block-count {
            margin-left: auto;
            background: rgba(2, 132, 199, 0.1);
            color: #0284c7;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .category-files {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .category-file-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #f8fafc;
        }

        .category-file-item:hover {
            background: #e0f2fe;
        }

        .category-file-item.active {
            background: #0284c7;
            color: white;
        }

        .category-file-item.active .file-item-name {
            color: white;
        }

        .category-file-item.active .file-item-type {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .file-item-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .file-item-info {
            flex: 1;
            min-width: 0;
        }

        .file-item-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e3a5f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-item-type {
            display: inline-block;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 4px;
            font-weight: 600;
        }

        /* 右侧预览窗口 */
        .preview-panel {
            width: 55%;
            min-width: 400px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(2, 132, 199, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 20px;
            height: fit-content;
            max-height: calc(100vh - 40px);
        }

        .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: linear-gradient(135deg, #f8fafc, #e0f2fe);
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .preview-title {
            font-size: 0.95rem;
            color: #1e3a5f;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }

        .preview-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid rgba(2, 132, 199, 0.2);
        }

        .zoom-btn {
            background: transparent;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #64748b;
            line-height: 1;
        }

        .zoom-btn:hover {
            background: #e0f2fe;
            color: #0284c7;
        }

        .zoom-level {
            font-size: 0.8rem;
            color: #0284c7;
            min-width: 45px;
            text-align: center;
            font-weight: 600;
        }

        .btn-close-preview {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            color: #94a3b8;
            transition: all 0.2s;
        }

        .btn-close-preview:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        .preview-body {
            flex: 1;
            overflow: hidden;
            background: #f1f5f9;
            position: relative;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-empty {
            text-align: center;
            color: #94a3b8;
            padding: 60px 40px;
        }

        .preview-empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .preview-empty-text {
            font-size: 1rem;
        }

        .preview-scroll-area {
            width: 100%;
            height: 100%;
            overflow: auto;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
        }

        .preview-scroll-area:active {
            cursor: grabbing;
        }

        .preview-scroll-area::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .preview-scroll-area::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 4px;
        }

        .preview-scroll-area::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 4px;
        }

        .preview-scroll-area::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .preview-image-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-image {
            transition: all 0.2s ease;
            display: block;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 100%;
            max-height: 100%;
        }

        .preview-pdf {
            width: 100%;
            height: 100%;
            min-height: 500px;
            border: none;
            display: block;
            background: #f8fafc;
        }

        .preview-footer {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .preview-file-info {
            font-size: 0.8rem;
            color: #64748b;
        }

        .preview-actions {
            display: flex;
            gap: 10px;
        }

        .btn-download-preview {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-download-preview:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }

        .no-results {
            text-align: center;
            padding: 80px 20px;
            color: #64748b;
        }

        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-category {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        footer {
            text-align: center;
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid rgba(2, 132, 199, 0.1);
            color: #64748b;
            font-size: 0.9rem;
        }

        footer a {
            color: #0284c7;
            text-decoration: none;
        }

        footer a:hover {
            color: #0369a1;
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .file-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .file-actions {
                width: 100%;
            }

            .btn {
                flex: 1;
                justify-content: center;
            }

            .preview-title {
                max-width: 150px;
            }

            .zoom-level {
                display: none;
            }

            .preview-body {
                height: calc(55vh - 52px - 52px) !important;
            }


        }
    </style>
</head>

                <div class="preview-footer" id="previewFooter" style="display:none;">

                    <div class="preview-actions">

                    </div>
                </div>
            </div>
        </div>

        <footer>

    </div>

            },
        ];


        // ===== 分类配置 =====
        const categories = [
            { id: 'online',   name: '线上设计', icon: '🌐', key: 'online'   },
            { id: 'offline',  name: '线下设计', icon: '📦', key: 'offline'  },
            { id: 'vi',       name: 'VI维护',   icon: '🎨', key: 'vi'       },
            { id: 'special',  name: '专项设计', icon: '✨', key: 'special'  },
        ];

        let currentFile = null;
        let currentItem = null;

        // ===== 图片缩放 =====
        function fitImage(img) {
            const scroll = document.getElementById('previewScrollArea');
            if (!scroll) return 1;
            const maxW = scroll.clientWidth - 40;
            const maxH = scroll.clientHeight - 40;
            const imgW = parseFloat(img.dataset.originalWidth) || img.naturalWidth;
            const imgH = parseFloat(img.dataset.originalHeight) || img.naturalHeight;
            if (!imgW || !imgH) return 1;
            const scale = Math.min(maxW / imgW, maxH / imgH, 1);
            img.dataset.fitScale = scale;
            return scale;
        }

        function setZoom(img, level) {
            const fitScale = parseFloat(img.dataset.fitScale) || 1;
            const targetScale = fitScale * level;
            const scroll = document.getElementById('previewScrollArea');
            const maxW = scroll.clientWidth - 40;
            const imgW = parseFloat(img.dataset.originalWidth) || img.naturalWidth;
            const displayW = imgW * targetScale;
            img.style.maxWidth = displayW + 'px';
            img.style.width = (displayW > maxW ? maxW : displayW) + 'px';
            img.style.height = 'auto';
        }

        function updateZoomDisplay(level) {
            const el = document.getElementById('zoomLevel');
            if (!el) return;
            if (level <= 1.5) el.textContent = '适应';
            else el.textContent = Math.round(level * 100) + '%';
        }

        document.getElementById('zoomInBtn').addEventListener('click', function() {
            const img = document.getElementById('previewImageWrapper').querySelector('img');
            if (!img) return;
            const cur = parseFloat(img.dataset.zoomLevel || 2);
            const next = Math.min(cur + 0.25, 4);
            img.dataset.zoomLevel = next;
            setZoom(img, next);
            updateZoomDisplay(next);
        });

        document.getElementById('zoomOutBtn').addEventListener('click', function() {
            const img = document.getElementById('previewImageWrapper').querySelector('img');
            if (!img) return;
            const cur = parseFloat(img.dataset.zoomLevel || 2);
            const next = Math.max(cur - 0.25, 0.5);
            img.dataset.zoomLevel = next;
            setZoom(img, next);
            updateZoomDisplay(next);
        });

        document.getElementById('zoomResetBtn').addEventListener('click', function() {
            const img = document.getElementById('previewImageWrapper').querySelector('img');
            if (!img) return;
            img.dataset.zoomLevel = '2';
            fitImage(img);
            setZoom(img, 2);
            updateZoomDisplay(2);
        });

        // ===== 拖拽滚动 =====
        (function() {
            const scroll = document.getElementById('previewScrollArea');
            if (!scroll) return;
            let dragging = false, startY = 0, scrollTop = 0;

            scroll.addEventListener('mousedown', function(e) {
                if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
                dragging = true;
                startY = e.pageY;
                scrollTop = scroll.scrollTop;
                scroll.style.cursor = 'grabbing';
            });

            document.addEventListener('mousemove', function(e) {
                if (!dragging) return;
                e.preventDefault();
                scroll.scrollTop = scrollTop + (startY - e.pageY);
            });

            document.addEventListener('mouseup', function() {
                if (dragging) { dragging = false; scroll.style.cursor = 'grab'; }
            });
        })();

        // ===== 点击文件项 =====
        function selectFile(file, itemEl) {
            // 移除之前的选中状态
            document.querySelectorAll('.category-file-item.active').forEach(el => {
                el.classList.remove('active');
            });
            itemEl.classList.add('active');
            currentFile = file;
            currentItem = itemEl;

            // 更新预览标题
            document.getElementById('previewTitle').textContent = file.name;

            // 显示缩放控制（仅图片）
            const zoomControls = document.getElementById('zoomControls');
            const footer = document.getElementById('previewFooter');
            const empty = document.getElementById('previewEmpty');
            const scrollArea = document.getElementById('previewScrollArea');
            const wrapper = document.getElementById('previewImageWrapper');

            zoomControls.style.display = file.type === 'image' ? 'flex' : 'none';
            footer.style.display = 'flex';
            empty.style.display = 'none';
            scrollArea.style.display = 'flex';

            // 更新底部信息
            document.getElementById('previewFileInfo').textContent =
                file.type.toUpperCase() + ' · ' + file.size + ' · ' + file.date;
            document.getElementById('downloadBtn').href = file.download;
            document.getElementById('downloadBtn').download = '';

            if (file.type === 'image') {
                wrapper.innerHTML = `<img src="${file.preview}" alt="${file.name}" style="max-width:100%;max-height:100%;display:block;cursor:grab;" class="preview-image">`;
                const img = wrapper.querySelector('img');
                img.onload = function() {
                    img.dataset.originalWidth = img.naturalWidth;
                    img.dataset.originalHeight = img.naturalHeight;
                    img.dataset.zoomLevel = '2';
                    fitImage(img);
                    setZoom(img, 2);
                    updateZoomDisplay(2);
                    scrollArea.scrollTop = 0;
                };
                if (img.complete && img.naturalWidth) {
                    img.dataset.originalWidth = img.naturalWidth;
                    img.dataset.originalHeight = img.naturalHeight;
                    img.dataset.zoomLevel = '2';
                    fitImage(img);
                    setZoom(img, 2);
                    updateZoomDisplay(2);
                    scrollArea.scrollTop = 0;
                }
                // 点击图片切换缩放
                img.addEventListener('click', function() {
                    const cur = parseFloat(img.dataset.zoomLevel || 2);
                    if (cur >= 2.5) {
                        img.dataset.zoomLevel = '1.5';
                        fitImage(img);
                        setZoom(img, 1.5);
                        updateZoomDisplay(1.5);
                    } else {
                        img.dataset.zoomLevel = '2';
                        setZoom(img, 2);
                        updateZoomDisplay('2');
                    }
                    scrollArea.scrollTop = 0;
                });
            } else if (file.type === 'pdf') {
                wrapper.innerHTML = `<iframe src="${file.preview}" style="width:100%;height:100%;border:none;background:#f8fafc;" title="${file.name}"></iframe>`;
            }
        }

        // ===== 渲染分类面板 =====
        function renderCategories(filter) {
            filter = filter.toLowerCase();
            const panel = document.getElementById('categoriesPanel');
            panel.innerHTML = '';

            categories.forEach(cat => {
                const catFiles = files.filter(f => f.category === cat.key &&
                    f.name.toLowerCase().includes(filter));

                const block = document.createElement('div');
                block.className = 'category-block';
                block.innerHTML = `
                    <div class="category-block-title">
                        <span class="category-block-icon">${cat.icon}</span>
                        <span class="category-block-name">${cat.name}</span>
                        <span class="category-block-count">${catFiles.length}</span>
                    </div>
                    <div class="category-files">
                        ${catFiles.length === 0 ? '<div style="color:#94a3b8;font-size:0.85rem;text-align:center;padding:20px;">暂无文件</div>' :
                          catFiles.map(f => `
                            <div class="category-file-item" onclick="selectFile(files.find(x => x.name === ${JSON.stringify(f.name)}), this)">
                                <span class="file-item-icon">${f.type === 'pdf' ? '📘' : '🖼️'}</span>
                                <div class="file-item-info">
                                    <div class="file-item-name" title="${f.name}">${f.name}</div>
                                    <span class="file-item-type tag-${f.type}">${f.type.toUpperCase()}</span>
                                </div>
                            </div>
                          `).join('')}
                    </div>
                `;
                panel.appendChild(block);
            });

            // 搜索时显示无结果提示
            const totalCount = categories.reduce((sum, cat) => {
                return sum + files.filter(f => f.category === cat.key &&
                    f.name.toLowerCase().includes(filter)).length;
            }, 0);
            if (totalCount === 0 && filter) {
                // 已在分类里处理
            }
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            renderCategories(e.target.value);
        });

        // 初始化
        renderCategories('');
    </script>

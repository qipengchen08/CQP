<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CQP 设计作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            color: white;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .folder-section {
            margin-bottom: 50px;
        }

        .folder-title {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .folder-title::before {
            content: "📁";
            font-size: 1.5rem;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .card-meta {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .btn-download:hover {
            opacity: 0.9;
        }

        .btn-preview {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 20px;
            background: #f8f9fa;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.3s ease;
        }

        .btn-preview:hover {
            background: #e9ecef;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            color: white;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 CQP 设计作品集</h1>
            <p class="subtitle">专业产品手册与设计文档下载</p>
        </header>

        <section class="folder-section">
            <h2 class="folder-title">产品手册</h2>
            <div class="card-grid">
                <div class="card">
                    <div class="card-icon">📘</div>
                    <div class="card-title">GD28系列灵巧型通用变频器产品手册（中文）</div>
                    <div class="card-meta">PDF 文档 | 2025年6月 V1.2</div>
                    <a href="https://github.com/qipengchen08/CQP/raw/main/GD28-manual.pdf" class="btn-download" download>
                        ⬇️ 下载文档
                    </a>
                    <a href="https://github.com/qipengchen08/CQP/blob/main/GD28-manual.pdf" class="btn-preview" target="_blank">
                        👁️ 在线预览
                    </a>
                </div>
            </div>
        </section>

        <footer>
            <p>📧 联系邮箱: your.email@example.com</p>
            <p style="margin-top: 10px;">© 2026 CQP 设计作品集</p>
        </footer>
    </div>
</body>
</html>
